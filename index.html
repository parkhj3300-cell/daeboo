<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>index</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#111111;--text2:#666666;--text3:#999999;
  --border:#e0e0e0;--border2:#cccccc;
  --accent:#111111;
  --success-bg:#e8f5e9;--success:#2e7d32;
  --warn-bg:#fff8e1;--warn:#f57f17;
  --danger-bg:#ffebee;--danger:#c62828;
  --radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
    --border:#333333;--border2:#444444;--accent:#f0f0f0;
    --success-bg:#1b3a1d;--success:#66bb6a;
    --warn-bg:#3a2e00;--warn:#ffd54f;
    --danger-bg:#3a1010;--danger:#ef5350;
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;font-size:15px}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:10}
.top-bar h1{font-size:18px;font-weight:600}
.scroll-area{flex:1;overflow-y:auto;padding:16px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer}
.btn:active{background:var(--bg3)}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);width:100%;justify-content:center;padding:13px;font-size:15px;border-radius:var(--radius);margin-top:20px}
.btn-ghost{border:none;background:none;color:var(--text2);padding:6px;cursor:pointer;font-size:22px;line-height:1}
.btn-danger{border:1px solid var(--danger);background:var(--danger-bg);color:var(--danger);padding:6px 12px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer}
.card:active{background:var(--bg2)}
.card-static{cursor:default}
.card-static:active{background:var(--bg)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.b-active{background:var(--success-bg);color:var(--success)}
.b-done{background:var(--bg3);color:var(--text2)}
.b-full{background:var(--success-bg);color:var(--success)}
.b-partial{background:var(--warn-bg);color:var(--warn)}
.b-unpaid{background:var(--danger-bg);color:var(--danger)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px}
.metric-val{font-size:19px;font-weight:600}
.form-group{margin-top:14px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--text)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:14px}
.field-row:last-child{border-bottom:none}
.field-label{color:var(--text2)}
.field-val{font-weight:500;text-align:right}
.month-item{padding:10px 0;border-bottom:1px solid var(--border)}
.month-item:last-child{border-bottom:none}
.month-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.month-name{font-size:14px;font-weight:500}
.month-amt{font-size:12px;color:var(--text2);margin-top:2px}
.status-btns{display:flex;gap:5px;flex-shrink:0}
.sbtn{padding:4px 9px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;background:var(--bg);color:var(--text2)}
.sbtn.on-full{background:var(--success-bg);color:var(--success);border-color:var(--success)}
.sbtn.on-partial{background:var(--warn-bg);color:var(--warn);border-color:var(--warn)}
.sbtn.on-unpaid{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
.partial-row{display:none;align-items:center;gap:8px;padding:8px 0 2px;justify-content:flex-end}
.partial-row.show{display:flex}
.partial-row input{width:130px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);color:var(--text)}
.empty{text-align:center;padding:48px 0;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;letter-spacing:0.3px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px 0;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div id="app"><div class="loading">불러오는 중...</div></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://orzvfpgogknktarkwxrt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_As0w0BZuF6hkCarYzZpa6g_hWt9JNl4';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let loans = [];
let view = 'list';
let detailId = null;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function commas(n){ return Number(n).toLocaleString('ko-KR'); }

function monthlyInterest(loan){
  return Math.round(loan.principal * (loan.rate/100) / 12);
}

function generateMonths(loan){
  let months = loan.months || {};
  let start = new Date(loan.loan_date);
  let end = loan.repay_date ? new Date(loan.repay_date) : new Date();
  let iday = loan.interest_day || 25;
  let cur = new Date(start.getFullYear(), start.getMonth()+1, iday);
  let keys = [];
  while(cur <= end){
    let key = cur.getFullYear()+'-'+(cur.getMonth()+1).toString().padStart(2,'0');
    if(!months[key]) months[key] = {status:'unpaid', partial:0};
    keys.push({key, date:new Date(cur)});
    cur.setMonth(cur.getMonth()+1);
  }
  return keys;
}

async function loadLoans(){
  const {data, error} = await db.from('loans').select('*').order('created_at', {ascending:false});
  if(error){ alert('데이터 불러오기 실패: '+error.message); return; }
  loans = data || [];
  render();
}

async function saveLoan(loan){
  const {error} = await db.from('loans').upsert(loan);
  if(error){ alert('저장 실패: '+error.message); return false; }
  return true;
}

async function removeLoan(id){
  const {error} = await db.from('loans').delete().eq('id', id);
  if(error){ alert('삭제 실패: '+error.message); return false; }
  return true;
}

function render(){
  const app = document.getElementById('app');
  if(view==='add'){ app.innerHTML = renderAdd(); return; }
  if(view==='detail'){ app.innerHTML = renderDetail(); return; }
  app.innerHTML = renderList();
}

/* ── LIST ── */
function renderList(){
  let active = loans.filter(l=>l.status==='진행');
  let totalP = active.reduce((a,l)=>a+l.principal,0);
  let totalMI = active.reduce((a,l)=>a+monthlyInterest(l),0);

  let cards = loans.length ? loans.map(l=>`
    <div class="card" onclick="detailId=${l.id};view='detail';render()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:16px;font-weight:600">${l.debtor}</span>
        <span class="badge ${l.status==='진행'?'b-active':'b-done'}">${l.status}</span>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">${l.creditor?'채권자 '+l.creditor+' · ':''} ${l.loan_date} ~ ${l.repay_date||'진행중'}</div>
      <div style="display:flex;gap:16px;font-size:14px;flex-wrap:wrap">
        <span>대출금 <strong>${commas(l.principal)}원</strong></span>
        <span>연 <strong>${l.rate}%</strong></span>
        <span>월이자 <strong>${commas(monthlyInterest(l))}원</strong></span>
      </div>
    </div>`).join('') : `<div class="empty"><div class="empty-icon">📋</div><div>등록된 채권이 없습니다<br>아래 버튼으로 추가하세요</div></div>`;

  return `
  <div class="top-bar">
    <h1>대부 장부</h1>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="loadLoans()">↻ 새로고침</button>
      <button class="btn" onclick="view='add';render()">+ 새 채권</button>
    </div>
  </div>
  <div class="scroll-area">
    <div class="metrics">
      <div class="metric"><div class="metric-label">진행 중 총 대출액</div><div class="metric-val">${(totalP/10000).toLocaleString()}만</div></div>
      <div class="metric"><div class="metric-label">월 이자 합계</div><div class="metric-val">${commas(totalMI)}원</div></div>
    </div>
    <div class="section-title">채권 목록 (${loans.length}건)</div>
    ${cards}
  </div>`;
}

/* ── ADD ── */
function renderAdd(){
  let today = new Date().toISOString().split('T')[0];
  return `
  <div class="top-bar">
    <button class="btn-ghost" onclick="view='list';render()">←</button>
    <h1>새 채권 등록</h1>
    <div style="width:36px"></div>
  </div>
  <div class="scroll-area">
    <div class="row2">
      <div class="form-group"><label>채무자 *</label><input id="f-debtor" placeholder="홍길동"></div>
      <div class="form-group"><label>채권자</label><input id="f-creditor" placeholder="본인"></div>
    </div>
    <div class="form-group"><label>대출금 (원) *</label><input id="f-principal" type="number" inputmode="numeric" placeholder="10000000"></div>
    <div class="row2">
      <div class="form-group"><label>연이율 (%) *</label><input id="f-rate" type="number" inputmode="decimal" step="0.1" placeholder="12"></div>
      <div class="form-group"><label>이자일 (매월)</label><input id="f-iday" type="number" inputmode="numeric" min="1" max="31" placeholder="25"></div>
    </div>
    <div class="row2">
      <div class="form-group"><label>대출일 *</label><input id="f-ldate" type="date" value="${today}"></div>
      <div class="form-group"><label>변제일</label><input id="f-rdate" type="date"></div>
    </div>
    <div class="form-group"><label>진행여부</label>
      <select id="f-status"><option value="진행">진행</option><option value="완료">완료</option></select>
    </div>
    <button class="btn-primary" onclick="addLoan()">등록하기</button>
  </div>`;
}

async function addLoan(){
  let d = {
    debtor: document.getElementById('f-debtor').value.trim(),
    creditor: document.getElementById('f-creditor').value.trim(),
    status: document.getElementById('f-status').value,
    principal: parseInt(document.getElementById('f-principal').value)||0,
    rate: parseFloat(document.getElementById('f-rate').value)||0,
    interest_day: parseInt(document.getElementById('f-iday').value)||25,
    loan_date: document.getElementById('f-ldate').value,
    repay_date: document.getElementById('f-rdate').value || null,
    months: {}
  };
  if(!d.debtor){ alert('채무자를 입력하세요.'); return; }
  if(!d.principal){ alert('대출금을 입력하세요.'); return; }
  if(!d.loan_date){ alert('대출일을 입력하세요.'); return; }
  if(!d.rate){ alert('연이율을 입력하세요.'); return; }
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '저장 중...'; btn.disabled = true;
  const ok = await saveLoan(d);
  if(ok){ toast('등록 완료!'); await loadLoans(); view='list'; render(); }
  else{ btn.textContent='등록하기'; btn.disabled=false; }
}

/* ── DETAIL ── */
function renderDetail(){
  let loan = loans.find(l=>l.id===detailId);
  if(!loan){ view='list'; render(); return ''; }
  let months = generateMonths(loan);
  let mi = monthlyInterest(loan);
  let totalExp = months.length * mi;
  let totalRec = months.reduce((a,m)=>{
    let md = (loan.months||{})[m.key];
    if(!md) return a;
    if(md.status==='full') return a+mi;
    if(md.status==='partial') return a+Number(md.partial||0);
    return a;
  },0);
  let pct = totalExp ? Math.round(totalRec/totalExp*100) : 0;

  let rows = months.length ? months.map(m=>{
    let md = (loan.months||{})[m.key]||{status:'unpaid',partial:0};
    let label = m.date.getFullYear()+'년 '+(m.date.getMonth()+1)+'월';
    let badge = md.status==='full'
      ? `<span class="badge b-full">완납</span>`
      : md.status==='partial'
        ? `<span class="badge b-partial">일부(${commas(md.partial)}원)</span>`
        : `<span class="badge b-unpaid">미수</span>`;
    return `<div class="month-item">
      <div class="month-top">
        <div>
          <div class="month-name">${label} ${badge}</div>
          <div class="month-amt">이자 ${commas(mi)}원</div>
        </div>
        <div class="status-btns">
          <button class="sbtn ${md.status==='full'?'on-full':''}" onclick="setStatus('${m.key}','full')">완납</button>
          <button class="sbtn ${md.status==='partial'?'on-partial':''}" onclick="togglePartial('${m.key}')">일부</button>
          <button class="sbtn ${md.status==='unpaid'?'on-unpaid':''}" onclick="setStatus('${m.key}','unpaid')">미수</button>
        </div>
      </div>
      <div class="partial-row ${md.status==='partial'?'show':''}" id="pr-${m.key}">
        <input id="pi-${m.key}" type="number" inputmode="numeric" placeholder="수령금액 입력" value="${md.partial||''}">
        <button class="btn" onclick="savePartial('${m.key}')">저장</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty"><div>이자 회차 없음<br>(대출일 다음 달부터 생성)</div></div>`;

  return `
  <div class="top-bar">
    <button class="btn-ghost" onclick="view='list';render()">←</button>
    <h1>${loan.debtor}</h1>
    <button class="btn-danger" onclick="deleteLoan(${loan.id})">삭제</button>
  </div>
  <div class="scroll-area">
    <div class="card card-static" style="margin-bottom:14px">
      <div class="field-row"><span class="field-label">채무자</span><span class="field-val">${loan.debtor}</span></div>
      <div class="field-row"><span class="field-label">채권자</span><span class="field-val">${loan.creditor||'-'}</span></div>
      <div class="field-row"><span class="field-label">대출금</span><span class="field-val">${commas(loan.principal)}원</span></div>
      <div class="field-row"><span class="field-label">연이율</span><span class="field-val">${loan.rate}%</span></div>
      <div class="field-row"><span class="field-label">월이자</span><span class="field-val" style="color:var(--success)">${commas(mi)}원</span></div>
      <div class="field-row"><span class="field-label">이자일</span><span class="field-val">매월 ${loan.interest_day}일</span></div>
      <div class="field-row"><span class="field-label">대출일</span><span class="field-val">${loan.loan_date||'-'}</span></div>
      <div class="field-row"><span class="field-label">변제일</span><span class="field-val">${loan.repay_date||'진행중'}</span></div>
      <div class="field-row"><span class="field-label">진행여부</span><span class="field-val"><span class="badge ${loan.status==='진행'?'b-active':'b-done'}">${loan.status}</span></span></div>
    </div>
    <div class="metrics" style="margin-bottom:14px">
      <div class="metric"><div class="metric-label">수령 예정</div><div class="metric-val">${commas(totalExp)}원</div></div>
      <div class="metric"><div class="metric-label">실수령 (${pct}%)</div><div class="metric-val" style="color:var(--success)">${commas(totalRec)}원</div></div>
    </div>
    <div class="section-title">월별 이자 수령 현황</div>
    <div class="card card-static">${rows}</div>
  </div>`;
}

async function setStatus(key, status){
  let loan = loans.find(l=>l.id===detailId);
  let months = JSON.parse(JSON.stringify(loan.months||{}));
  if(!months[key]) months[key]={status:'unpaid',partial:0};
  months[key].status = status;
  if(status!=='partial') months[key].partial = 0;
  const ok = await saveLoan({id:loan.id, months});
  if(ok){ loan.months = months; toast(status==='full'?'완납 처리':status==='unpaid'?'미수 처리':'저장 완료'); render(); }
}

async function togglePartial(key){
  let loan = loans.find(l=>l.id===detailId);
  let months = JSON.parse(JSON.stringify(loan.months||{}));
  if(!months[key]) months[key]={status:'unpaid',partial:0};
  months[key].status = 'partial';
  loan.months = months;
  render();
  setTimeout(()=>{ let inp=document.getElementById('pi-'+key); if(inp) inp.focus(); },50);
}

async function savePartial(key){
  let val = parseInt(document.getElementById('pi-'+key).value)||0;
  let loan = loans.find(l=>l.id===detailId);
  let months = JSON.parse(JSON.stringify(loan.months||{}));
  if(!months[key]) months[key]={status:'partial',partial:0};
  months[key].partial = val;
  months[key].status = 'partial';
  const ok = await saveLoan({id:loan.id, months});
  if(ok){ loan.months = months; toast('저장 완료!'); render(); }
}

async function deleteLoan(id){
  if(!confirm('이 채권을 삭제하시겠습니까?')) return;
  const ok = await removeLoan(id);
  if(ok){ toast('삭제 완료'); await loadLoans(); view='list'; render(); }
}

loadLoans();
</script>
</body>
</html>
